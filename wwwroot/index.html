<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Habits</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" id="theme-color-meta" content="#2da44e" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Habits" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

    <!-- Tailwind CSS play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
                    },
                    height: { dvh: '100dvh' },
                    minHeight: { dvh: '100dvh' },
                    animation: {
                        'dropdown':  'dropdownEnter  0.18s cubic-bezier(.22,1,.36,1) both',
                        'month-in':  'monthEnter     0.35s cubic-bezier(.22,1,.36,1) both',
                        'stat-in':   'statEnter      0.40s cubic-bezier(.22,1,.36,1) both',
                        'modal-in':  'modalEnter     0.25s cubic-bezier(.22,1,.36,1) both',
                        'overlay-in':'overlayEnter   0.18s ease both',
                        'empty-in':  'emptyEnter     0.45s cubic-bezier(.22,1,.36,1) both',
                    },
                    keyframes: {
                        dropdownEnter: {
                            '0%':   { opacity: '0', transform: 'translateY(-6px) scale(0.97)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        },
                        monthEnter: {
                            '0%':   { opacity: '0', transform: 'translateY(14px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        statEnter: {
                            '0%':   { opacity: '0', transform: 'translateY(18px) scale(0.96)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        },
                        modalEnter: {
                            '0%':   { opacity: '0', transform: 'translateY(36px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        overlayEnter: {
                            '0%':   { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        emptyEnter: {
                            '0%':   { opacity: '0', transform: 'scale(0.94) translateY(12px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>

    <!-- Dark mode: apply saved preference before first paint to avoid flash -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                var isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    var m = document.getElementById('theme-color-meta');
                    if (m) m.setAttribute('content', '#111827');
                }
            } catch (e) { }
        })();
    </script>

    <!-- Blazor error UI + loading spinner -->
    <style>
        html, body { margin: 0; padding: 0; }
        .loading-progress { position: absolute; display: block; width: 8rem; height: 8rem; inset: 20vh 0 auto 0; margin: 0 auto; }
        .loading-progress circle { fill: none; stroke: #e0e0e0; stroke-width: 0.6rem; transform-origin: 50% 50%; transform: rotate(-90deg); }
        .loading-progress circle:last-child { stroke: #2da44e; stroke-dasharray: calc(3.141 * var(--blazor-load-percentage, 0%) * 0.8), 500%; transition: stroke-dasharray 0.05s ease-in-out; }
        .loading-progress-text { position: absolute; text-align: center; font-weight: bold; inset: calc(20vh + 3.25rem) 0 auto 0.2rem; }
        .loading-progress-text:after { content: var(--blazor-load-percentage-text, "Loading"); }
        #blazor-error-ui { background: lightyellow; bottom: 0; box-shadow: 0 -1px 2px rgba(0,0,0,.2); display: none; left: 0; padding: .6rem 1.25rem .7rem; position: fixed; width: 100%; z-index: 1000; font-family: sans-serif; }
        #blazor-error-ui .dismiss { cursor: pointer; position: absolute; right: .75rem; top: .5rem; }
    </style>
    <link rel="stylesheet" href="css/app.css" />
    <link href="TaskManager.styles.css" rel="stylesheet" />
</head>

<body class="bg-white dark:bg-gray-950 overflow-hidden">
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/habitStorage.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script>
        window.darkMode = {
            toggle: function () {
                var isDark = document.documentElement.classList.toggle('dark');
                try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) { }
                var m = document.getElementById('theme-color-meta');
                if (m) m.setAttribute('content', isDark ? '#111827' : '#2da44e');
                return isDark;
            },
            isDark: function () {
                return document.documentElement.classList.contains('dark');
            }
        };
        window.scrollToBottom = function (elementId) {
            var el = document.getElementById(elementId);
            if (el) el.scrollTop = el.scrollHeight;
        };
    </script>
</body>

</html>
