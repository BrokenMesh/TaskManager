name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          # Set base href BEFORE publish so the import map and SRI hash are generated correctly
          sed -i 's|<base href="/" />|<base href="/TaskManager/" />|g' wwwroot/index.html
          # Disable compression: GitHub Pages can't serve pre-compressed .br/.gz files
          # with the correct Content-Encoding headers, causing 404s on _framework files
          dotnet publish -c Release -o publish -p:BlazorEnableCompression=false
          # Remove compressed files that causes conflicts on GitHub Pages
          rm -f publish/wwwroot/_framework/*.br publish/wwwroot/_framework/*.gz
          # Prevent Jekyll from ignoring _framework folder
          touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
